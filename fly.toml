app = "hotelmgmt-backend"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"
  DJANGO_DEBUG = "False"
  DJANGO_ALLOWED_HOSTS = ".fly.dev,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS = "https://hotelmgmt-backend.fly.dev"

[deploy]
  release_command = "python manage.py migrate_schemas --shared"

[processes]
  web = "gunicorn hotelmgmt.wsgi:application --bind 0.0.0.0:$PORT --workers 3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
