services:
  - type: web
    name: hotelmgmt-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate_schemas --noinput && python manage.py bootstrap_public_tenant --domain ${RENDER_EXTERNAL_HOSTNAME:-hotelmgmt-backend.onrender.com} && python manage.py bootstrap_tenant_from_env && gunicorn hotelmgmt.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DJANGO_SETTINGS_MODULE
        value: hotelmgmt.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hotelmgmt-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        sync: false
      - key: BOOTSTRAP_TENANT_NAME
        sync: false
      - key: BOOTSTRAP_TENANT_DOMAIN
        sync: false
      - key: BOOTSTRAP_TENANT_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_TENANT_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_TENANT_CURRENCY
        value: "NPR"
