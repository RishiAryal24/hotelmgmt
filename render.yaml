services:
  - type: web
    name: hotelmgmt
    env: python
    plan: free

    rootDir: backend

    buildCommand: 
      cd backend
      pip install --upgrade pip setuptools wheel
      apt-get update && apt-get install -y libjpeg-dev zlib1g-dev libpng-dev
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput

    startCommand: gunicorn hotelmgmt.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: hotelmgmt.settings
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false