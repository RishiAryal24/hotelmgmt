services:
  - type: web
    name: hotelmgmt
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn hotelmgmt.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DJANGO_SETTINGS_MODULE
        value: hotelmgmt.settings
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false